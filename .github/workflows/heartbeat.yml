name: Supabase heartbeat

on:
  schedule:
    - cron: '17 */12 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-heartbeat
  cancel-in-progress: false

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run heartbeat
        run: yarn heartbeat
        env:
          SUPABASE_DATABASE_URLS: ${{ secrets.SUPABASE_DATABASE_URLS }}
          SUPABASE_HEARTBEAT_CONCURRENCY: '4'
          SUPABASE_HEARTBEAT_ID: github-actions
